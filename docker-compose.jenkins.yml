name: ditlib-jenkins

services:
  jenkins:
    build: ./jenkins
    container_name: ditlib-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8090:8080"
    environment:
      # Wizard de configuration initiale saute : securite + admin definis
      # par casc.yaml (voir README.md, section "Lancer Jenkins en local").
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
      # Decommenter la ligne ci-dessous en plus de celle du JAVA_OPTS
      # (avec && entre les deux -D) pour tester le pipeline en local sans
      # pousser sur GitHub :
      # JAVA_OPTS: -Djenkins.install.runSetupWizard=false -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:?definir JENKINS_ADMIN_PASSWORD dans .env}
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      # Decommenter pour tester le pipeline en local sans pousser sur GitHub
      # (voir README.md, section "Configuration du job") :
      # - .:/workspace/DITLib:ro
    networks:
      - biblio-network

volumes:
  jenkins_home:

networks:
  biblio-network:
    external: true
