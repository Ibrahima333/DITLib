services:
  postgres:
    image: postgres:16
    container_name: biblio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - biblio-network

  livres-service:
    build: ./livres-service
    container_name: livres-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    ports:
      - "8011:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - biblio-network

  utilisateurs-service:
    build: ./utilisateurs-service
    container_name: utilisateurs-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - biblio-network

  emprunts-service:
    build: ./emprunts-service
    container_name: emprunts-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      LIVRES_SERVICE_URL: http://livres-service:8000
      UTILISATEURS_SERVICE_URL: http://utilisateurs-service:8000
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      livres-service:
        condition: service_started
      utilisateurs-service:
        condition: service_started
    networks:
      - biblio-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_LIVRES_API_URL: http://localhost:8011
        VITE_UTILISATEURS_API_URL: http://localhost:8002
        VITE_EMPRUNTS_API_URL: http://localhost:8003
    container_name: biblio-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - livres-service
      - utilisateurs-service
      - emprunts-service
    networks:
      - biblio-network

volumes:
  postgres_data:

networks:
  biblio-network:
    name: biblio-network
    driver: bridge
